    {field = 'payment_type', column = 1, vital=true, type = "string", string_pattern ='^([A-Z0-9_\-/*.,&\s]+)$'},
    {field = 'description', column = 2, vital=true, type = "string", string_pattern = '^([A-Z0-9_\-/*.,&\s]+)$'},
    # Amount paid out of account (debit)
    {field = 'paid_in_£', column = 3, vital=false, type = "currency"},
    # Amount paid into account (credit)
    {field = 'paid_out_£', column = 4, vital=false, type = "currency"},
    # Running account balance after transaction
    {field = 'balance_£', column = 5, vital=true, type = "currency"},
]
# Data quality filters: delete rows that fail extraction or validation
