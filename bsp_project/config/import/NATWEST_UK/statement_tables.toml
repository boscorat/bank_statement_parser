    {vertical_lines = [55, 109, 109, 205, 205, 361, 361, 427, 427, 492, 492, 555], allow_text_failover = true},
]
fields = [
    # Transaction date (format: DD MMM YY, e.g., "15 Jan 2024")
    {field = 'date', column = 0, vital=true, type = "string", string_pattern ='^[1-3]?[0-9]\s?[A-Z][a-z]{2}\s?[0-9]{4}$'},
