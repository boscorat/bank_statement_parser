# release.yml — build and publish on version tag push.
#
# Triggered by pushing a tag like "v0.1.0".  Four jobs run in sequence:
#
#   1. pypi-publish    — build wheel + sdist, publish to PyPI via OIDC.
#   2. system-packages — build .deb and .rpm via fpm.
#   3. github-release  — create a GitHub Release with all assets attached.
#   4. deploy-docs     — generate and deploy versioned docs to GitHub Pages.
#
# The tagged commit must be on either the 'release' branch OR on a matching
# version branch (e.g., tag v0.3.1 on branch v0.3.1).  This allows per-version
# release branches for maintenance and hotfixes while keeping the 'release'
# branch as a fallback for direct releases.
#
# One-time setup required:
#   - Create a "pypi" environment in GitHub repo Settings > Environments.
#   - Register a Trusted Publisher on PyPI (account > Publishing):
#       Owner: boscorat
#       Repository: bank_statement_parser
#       Workflow: release.yml
#       Environment: pypi
#   - Enable GitHub Pages on gh-pages branch (Settings > Pages).
#   - Configure Pages to deploy from gh-pages branch.

name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}  # no workflow-level permissions; each job declares its own

jobs:
  # ── Build wheel + sdist and publish to PyPI ─────────────────────────
  pypi-publish:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    outputs:
      version: ${{ steps.version.outputs.version }}
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Verify tag is on release or version branch
        run: |
          TAG_COMMIT="$(git rev-parse "${GITHUB_SHA}^{commit}")"
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          
          # Unshallow if needed
          if git rev-parse --is-shallow-repository | grep -q true; then
            git fetch origin release --unshallow
          else
            git fetch origin release
          fi

          # Fetch matching version branch only if it exists (don't hide real fetch failures)
          if git ls-remote --exit-code --heads origin "${TAG_NAME}" >/dev/null 2>&1; then
            git fetch origin "refs/heads/${TAG_NAME}":refs/remotes/origin/"${TAG_NAME}"
          fi
          
          # Check if tag is on release branch
          if git merge-base --is-ancestor "$TAG_COMMIT" origin/release; then
            echo "✓ Tag is on release branch"
            exit 0
          fi
          
          # Check if tag is on matching version branch (e.g., v0.3.1 tag on v0.3.1 branch)
          if git rev-parse "origin/${TAG_NAME}" >/dev/null 2>&1; then
            if git merge-base --is-ancestor "$TAG_COMMIT" "origin/${TAG_NAME}"; then
              echo "✓ Tag is on matching version branch ${TAG_NAME}"
              exit 0
            fi
          fi
          
          echo "::error::Tagged commit must be on 'release' or on a matching version branch (${TAG_NAME}). Cherry-pick/merge the commit onto one of those branches (and push the branch if needed)."
          exit 1

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          enable-cache: false

      - name: Install Python
        run: uv python install 3.14.2

      - name: Validate tag matches pyproject.toml version
        id: version
        run: |
          VERSION=$(uv run python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$TAG_VERSION" != "$VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match pyproject.toml version ($VERSION)"
            exit 1
          fi

      - name: Get release date from git tag
        id: date
        run: |
          # Extract the date when the tag was created (not when the workflow ran)
          TAG_DATE=$(git log -1 --format=%ai "${{ github.ref }}" | cut -d' ' -f1)
          echo "date=$TAG_DATE" >> "$GITHUB_OUTPUT"

      - name: Build changelog with towncrier
        run: |
          uv sync --group dev
          uv run towncrier build --yes \
            --version "${{ steps.version.outputs.version }}" \
            --date "${{ steps.date.outputs.date }}"

      - name: Verify towncrier cleaned up all fragments
        run: |
          # Check that all fragment files were deleted (only .gitkeep and template should remain)
          REMAINING=$(find changes/ -type f ! -name '_template.md.jinja' ! -name '.gitkeep' | wc -l)
          if [ "$REMAINING" -ne 0 ]; then
            echo "::error::Towncrier did not clean up all fragments after build"
            echo "Remaining files:"
            find changes/ -type f ! -name '_template.md.jinja' ! -name '.gitkeep'
            exit 1
          fi
          echo "✓ All fragment files were successfully cleaned up"

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md changes/
          git diff --cached --quiet || git commit -m "docs: changelog for v${{ steps.version.outputs.version }}"
          git push origin HEAD

      - name: Build sdist and wheel
        run: uv build

      - name: Smoke-test wheel import
        run: |
          uv run --isolated --no-project --with dist/*.whl -- \
            python -c "import bank_statement_parser; print(bank_statement_parser.__version__)"

      - name: Publish to PyPI
        run: uv publish

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: python-dists
          path: dist/

  # ── Build .deb and .rpm via fpm ─────────────────────────────────────
  system-packages:
    name: Build .deb and .rpm
    runs-on: ubuntu-24.04
    needs: pypi-publish
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          enable-cache: false

      - name: Install Python 3.14.2
        run: uv python install 3.14.2

      - name: Extract version
        id: version
        run: |
          VERSION=$(uv run python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create application virtualenv
        run: |
          uv venv /tmp/bsp-venv --python 3.14.2
          uv pip install --python /tmp/bsp-venv/bin/python .

      - name: Make venv self-contained for packaging
        run: |
          # Resolve the base Python installation that uv used for this venv.
          BASE_DIR=$(dirname "$(dirname "$(readlink -f /tmp/bsp-venv/bin/python)")")

          # 1. Copy the real CPython binary into the venv (uv hardlinks it from
          #    its managed install; --remove-destination breaks the link so the
          #    binary survives packaging as an independent copy).
          cp --remove-destination "$BASE_DIR/bin/python3.14" /tmp/bsp-venv/bin/python
          ln -sf python /tmp/bsp-venv/bin/python3
          ln -sf python /tmp/bsp-venv/bin/python3.14

          # 2. Copy the stdlib into the venv.  A virtualenv only contains
          #    site-packages; the stdlib lives in the base install.  We merge it
          #    in so the package is fully self-contained.
          cp -rn "$BASE_DIR/lib/python3.14/"* /tmp/bsp-venv/lib/python3.14/

          # 3. Remove pyvenv.cfg so the interpreter sees this tree as a regular
          #    prefix install (bin/ + lib/python3.14/) rather than a virtualenv
          #    with a dangling 'home' reference to the build machine.
          rm /tmp/bsp-venv/pyvenv.cfg

          # 4. Rewrite shebangs from the build-time path to the install path.
          grep -rl '#!/tmp/bsp-venv/' /tmp/bsp-venv/bin/ | \
            xargs sed -i 's|#!/tmp/bsp-venv/|#!/opt/uk-bank-statement-parser/|g'

          # 5. Smoke-test: the patched interpreter must be able to import the
          #    stdlib and the installed package from its new prefix.
          /tmp/bsp-venv/bin/python -c "
          import sys, encodings
          from bank_statement_parser import __version__
          print(f'OK  python {sys.version}  bsp {__version__}  prefix={sys.prefix}')
          "

      - name: Install fpm
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev gcc make rpm
          sudo gem install fpm --no-document

      - name: Create bsp wrapper script
        run: |
          mkdir -p /tmp/bsp-pkg/usr/bin
          cat > /tmp/bsp-pkg/usr/bin/bsp << 'WRAPPER'
          #!/bin/sh
          exec /opt/uk-bank-statement-parser/bin/bsp "$@"
          WRAPPER
          chmod 755 /tmp/bsp-pkg/usr/bin/bsp

      - name: Build .deb
        env:
          PKG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          fpm \
            -s dir \
            -t deb \
            -n uk-bank-statement-parser \
            -v "${PKG_VERSION}" \
            --description "Parse bank statement PDFs, extract transactions, persist to Parquet and SQLite." \
            --license "LGPL-3.0-or-later" \
            --maintainer "Jason Farrar <farrar.jason1@gmail.com>" \
            --url "https://github.com/boscorat/bank_statement_parser" \
            --vendor "boscorat" \
            --category "utils" \
            --architecture all \
            --deb-no-default-config-files \
            -p "uk-bank-statement-parser_${PKG_VERSION}_all.deb" \
            /tmp/bsp-venv/=/opt/uk-bank-statement-parser/ \
            /tmp/bsp-pkg/usr/bin/bsp=/usr/bin/bsp

      - name: Build .rpm
        env:
          PKG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          fpm \
            -s dir \
            -t rpm \
            -n uk-bank-statement-parser \
            -v "${PKG_VERSION}" \
            --description "Parse bank statement PDFs, extract transactions, persist to Parquet and SQLite." \
            --license "LGPL-3.0-or-later" \
            --maintainer "Jason Farrar <farrar.jason1@gmail.com>" \
            --url "https://github.com/boscorat/bank_statement_parser" \
            --vendor "boscorat" \
            --category "Utilities" \
            --architecture all \
            --rpm-os linux \
            -p "uk-bank-statement-parser-${PKG_VERSION}-1.noarch.rpm" \
            /tmp/bsp-venv/=/opt/uk-bank-statement-parser/ \
            /tmp/bsp-pkg/usr/bin/bsp=/usr/bin/bsp

      - name: Upload package artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: system-packages
          path: |
            *.deb
            *.rpm

  # ── Create GitHub Release with all assets ───────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [pypi-publish, system-packages]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: master

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ needs.pypi-publish.outputs.version }}"
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" \
            CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "## What's Changed" > release_notes.md
            echo "See [CHANGELOG.md](https://github.com/boscorat/bank_statement_parser/blob/master/CHANGELOG.md) for details." >> release_notes.md
          fi

      - name: Download Python dists
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: python-dists
          path: dist/

      - name: Download system packages
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: system-packages
          path: packages/

      - name: Create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          body_path: release_notes.md
          files: |
            dist/*
            packages/*

  # ── Generate and deploy docs to GitHub Pages ──────────────────────────
  deploy-docs:
    name: Generate & Deploy Docs
    runs-on: ubuntu-latest
    needs: [pypi-publish, github-release]
    permissions:
      contents: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: true

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          enable-cache: false

      - name: Install Python
        run: uv python install 3.14.2

      - name: Install dependencies
        run: uv sync --group dev

      - name: Generate docs for this release
        run: uv run python scripts/generate_docs.py

      - name: Build site with mkdocs
        run: uv run zensical build --clean
        env:
          GOATCOUNTER_URL: ${{ secrets.GOATCOUNTER_URL }}

      - name: Fetch existing gh-pages to avoid orphan push rejection
        run: git fetch origin gh-pages:gh-pages --depth=1 || true

      - name: Deploy current version with mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          uv run mike deploy --push --update-aliases \
            "${{ needs.pypi-publish.outputs.version }}" latest

      - name: Fetch all tags for retroactive updates
        run: git fetch origin --tags --prune

      - name: Retroactively update 2 prior versions
        run: |
          set -e
          
          # Get all tags sorted by version (newest first), then take 2nd and 3rd
          TAGS=$(git tag --sort=-version:refname)
          PRIOR_VERSIONS=$(echo "$TAGS" | head -3 | tail -2)
          
          for tag in $PRIOR_VERSIONS; do
            version="${tag#v}"
            echo "Retroactively updating docs for $version with current bank configs..."
            
            # Stash any uncommitted changes
            git stash || true
            
            # Checkout the old tag to get its docs state (tag has v prefix)
            git checkout "$tag" -- docs/
            
            # Get the latest bank configs from master
            git checkout origin/master -- src/bank_statement_parser/project/config/import/
            
            # Regenerate docs with new bank data
            uv run python scripts/generate_docs.py
            
            # Deploy locally (no push) — mike creates a commit on local gh-pages
            uv run mike deploy "$version"
          done

          # Create root index.html that redirects to latest/
          uv run mike set-default latest

          # Push all retroactive commits to remote in one go
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push origin gh-pages

      - name: Clean up
        if: always()
        run: git stash pop || true
