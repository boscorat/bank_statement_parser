name: Deploy Docs

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'scripts/generate_docs.py'
      - 'src/bank_statement_parser/__init__.py'
      - 'src/bank_statement_parser/cli.py'
      - 'src/bank_statement_parser/modules/anonymise.py'
      - 'src/bank_statement_parser/modules/data.py'
      - 'src/bank_statement_parser/modules/paths.py'
      - 'src/bank_statement_parser/modules/reports_db.py'
      - 'src/bank_statement_parser/modules/reports_parquet.py'
      - 'src/bank_statement_parser/data/__init__.py'
      - 'src/bank_statement_parser/project/config/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b  # v5

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          enable-cache: false

      - name: Install dependencies
        run: uv sync --group dev

      - name: Generate docs from source
        run: uv run python scripts/generate_docs.py

      - name: Build site
        run: uv run zensical build --clean

      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b  # v4
        with:
          path: site

      - uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4
        id: deployment
