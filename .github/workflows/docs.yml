name: Deploy Docs

on:
  workflow_dispatch:
    inputs:
      target_version:
        description: "Version to regenerate (e.g., 'latest' or '0.2.1')"
        required: false
        default: "latest"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: true

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          enable-cache: false

      - name: Install Python
        run: uv python install 3.14.2

      - name: Install dependencies
        run: uv sync --group dev

      - name: Generate docs from source
        run: uv run python scripts/generate_docs.py

      - name: Build site
        run: uv run zensical build --clean
        env:
          GOATCOUNTER_URL: ${{ secrets.GOATCOUNTER_URL }}

      - name: Deploy with mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          uv run mike deploy --push \
            "${{ github.event.inputs.target_version || 'latest' }}"
