name: CI

on:
  pull_request:
    branches: [master, release]

permissions: {}  # no workflow-level permissions; each job declares its own

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          enable-cache: false

      - name: Install dependencies
        run: uv sync --group dev

      - name: Set up SSH for private repo access
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY_TEST_DATA }}

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Check towncrier fragments
        run: uv run towncrier check --compare-with "${{ github.event.pull_request.base.sha }}"
      - name: Pytest
        run: uv run pytest -v
