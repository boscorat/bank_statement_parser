name: "Parsing issue"
description: "Report a parsing error or unexpected result for a bank that is already supported."
title: "[Parsing issue] <Bank name> — "
labels: ["bug", "parsing"]
body:
   - type: markdown
     attributes:
       value: |
         Thanks for the report! Precise details and an anonymised statement make it much faster to diagnose and fix parsing issues.
         
         ⚠️ **IMPORTANT: Do not attach your original statement.** Only attach anonymised PDFs (all personal/financial info scrambled).
         
         See [SECURITY.md](../../SECURITY.md) for how to safely anonymise and share statements.

  - type: input
    id: bank_account
    attributes:
      label: Bank and account type
      description: The bank name and account type that is failing to parse correctly.
      placeholder: e.g. HSBC UK — Rewards Credit Card
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen? (e.g. "All 34 transactions should have been imported.")
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: >
        What actually happened? If openstan showed a parsing error, paste the debug output
        from the Import Results screen here. If using the CLI, paste the terminal output.
      placeholder: Paste debug output or error message here.
    validations:
      required: true

  - type: input
    id: bsp_version
    attributes:
      label: bank_statement_parser version
      description: >
        Run `bsp --version` or check your `pyproject.toml` / `requirements.txt`.
        In openstan, the version is shown on the About screen.
      placeholder: e.g. 0.2.1b2
    validations:
      required: true

   - type: markdown
     attributes:
       value: |
         ---
         ### Attaching an Anonymised Statement

         > **You must anonymise your statement before attaching it.**
         >
         > An anonymised statement has all text scrambled so that no personal or financial
         > information is readable, while preserving enough structure for the parser to work with.
         >
         > **How to anonymise:**
         > - Using **openstan**: Screens → Anonymise PDF
         > - Using **CLI**: `bsp anonymise your_statement.pdf`
         > - Using **Python**: See [documentation](https://boscorat.github.io/bank_statement_parser/guides/anonymisation/)
         >
         > **After anonymising:**
         > - Verify the output has NO readable names, numbers, or addresses
         > - See [SECURITY.md](../../SECURITY.md) for verification checklist
         > - Attach the anonymised version here (safe to share)
         >
         > ⚠️ **Statements that are not properly anonymised will be removed without review.**

   - type: textarea
     id: statement_attachment
     attributes:
       label: Anonymised statement
       description: >
         Drag and drop your anonymised PDF here (not your original statement).
         GitHub accepts PDF attachments directly in this field.
         Attaching an anonymised statement is strongly recommended — issues without one may take longer to investigate.
         See [SECURITY.md](../../SECURITY.md) for details.
       placeholder: Drag and drop the anonymised PDF here (safe to share after anonymisation).
     validations:
       required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: >
        Anything else that might help — number of pages in the statement, whether it's a
        downloaded PDF or a scanned copy, OS and Python version, etc.
    validations:
      required: false
