# anonymise.toml — exclusion config for full-scramble PDF anonymisation.
#
# HOW IT WORKS
# ------------
# anonymise starts with a completely scrambled PDF — every *letter* on
# every page is replaced with a different random letter of the same case.
# Only letters are scrambled by default; digits, punctuation, symbols and
# whitespace are left exactly as they appear in the PDF.
#
# Use this file to:
#   1. Mark specific number strings for digit scrambling    → [numbers_to_scramble]
#   2. Protect words / phrases from being scrambled at all  → [words_to_not_scramble]
#   3. Sanitise the output filename                         → [filename_replacements]
#
# HOW TO USE
# ----------
# 1. Copy anonymise_example.toml to anonymise.toml in the same directory.
# 2. Run anonymise_pdf (or bsp anonymise) on your statement.
# 3. Open the output PDF and note what structural text is unreadable.
# 4. Add those phrases / codes to [words_to_not_scramble] below.
# 5. Re-run until the output is parseable by the statement processing pipeline.
# 6. Keep anonymise.toml out of source control — it may still contain
#    information about the bank you are targeting.
#
# MATCHING RULES
# --------------
# [numbers_to_scramble]
#   values = [...]  — substrings; if a Tj fragment's decoded text *contains*
#   one of these strings (case-insensitive, whitespace-stripped), every digit
#   character in that fragment is replaced with a different random digit.
#   Separators (hyphens etc.) are preserved.  Leave the list empty to keep
#   all digits unchanged.
#
# [words_to_not_scramble]
#   exclude = [...]  — words or phrases that must appear unchanged in the
#   output.  Matching is case-insensitive and ignores ALL whitespace, so
#   "Balance Brought Forward" matches even when the PDF renders it across
#   multiple Tj calls.  The full phrase must match exactly — partial matches
#   are not supported.
#
# [filename_replacements]
#   Key/value pairs applied to the output filename stem before prepending the
#   "anonymised_" prefix.  Place LONGER / MORE SPECIFIC strings BEFORE
#   shorter fragments to avoid partial-match collisions.

# ---------------------------------------------------------------------------
# Numbers to scramble (opt-in digit scrambling)
# ---------------------------------------------------------------------------
# Add the sort codes, account numbers, or other numeric strings you want
# replaced with random digits.  Only the digit characters inside each
# matching Tj fragment are replaced — separators such as hyphens are kept.
#
# Examples:
#   "11-22-33"    — sort code with hyphens
#   "12345678"    — account number

[numbers_to_scramble]
values = [
    "11-22-33",
    "112233",
    "12345678",
]

# ---------------------------------------------------------------------------
# Words and phrases to NOT scramble
# ---------------------------------------------------------------------------
# Pre-populated with English month names, date conjunctions, and common UK
# bank transaction type codes.  Add any other structural phrases that must
# remain readable so the statement parser can function correctly.

[words_to_not_scramble]
exclude = [
    # --- English month names (full) ---
    "January",
    "February",
    "March",
    "April",
    "May",
    "June",
    "July",
    "August",
    "September",
    "October",
    "November",
    "December",
    # --- English month names (abbreviated) ---
    "Jan",
    "Feb",
    "Mar",
    "Apr",
    # "May" already listed above
    "Jun",
    "Jul",
    "Aug",
    "Sep",
    "Oct",
    "Nov",
    "Dec",
    # --- Date conjunctions ---
    "from",
    "to",
    # --- Common UK bank transaction type codes ---
    "DD",
    "SO",
    "TFR",
    "VIS",
    "BP",
    "ATM",
    "CR",
    "DR",
    "OBP",
    "CC",
    "FP",
    "CHQ",
    "BGC",
    "BAC",
    "CPT",
    "INT",
    "DIRECT DEBIT",
    "CASH WITHDRAWAL",
    "FASTER PAYMENT",
    "STANDING ORDER",
    # --- Add bank-specific phrases below ---
    "Balance Brought Forward",
    "Balance Carried Forward",
    "Spend & Save Account",
    "Classic Plus Account",
    "Current Account",
    "Statement of Account",
    "STATEMENT OPENING BALANCE",
    "STATEMENT CLOSING BALANCE",
    # --- Transaction Headings ---
    "Date",
    "Payment type",
    "Details",
    "Money Out",
    "Money In",
    "Your Transactions",
    "Sort Code",
    "Account Number",
    "Balance"
]

# ---------------------------------------------------------------------------
# Filename replacements
# ---------------------------------------------------------------------------
# Applied to the output filename stem before prepending "anonymised_".
# Use this to remove real names or account references from the filename.
#
# Format:  "real text in filename" = "replacement text"
# Rules:   Place LONGER strings BEFORE shorter fragments.

[filename_replacements]
# "RealSurname" = "Testname"
# "RealAccountRef" = "AccRef"
